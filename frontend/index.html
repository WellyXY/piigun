<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piigu Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #07090f;
      --surface:  #0d1117;
      --panel:    #111827;
      --border:   #1e2738;
      --border2:  #263248;
      --accent:   #6366f1;
      --accent2:  #818cf8;
      --glow:     rgba(99,102,241,.18);
      --green:    #10b981;
      --red:      #f43f5e;
      --amber:    #f59e0b;
      --sky:      #38bdf8;
      --txt1:     #f1f5f9;
      --txt2:     #94a3b8;
      --txt3:     #475569;
      --radius:   12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--txt1);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Top bar ── */
    .topbar {
      height: 56px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
      background: rgba(13,17,23,.9);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -.3px;
    }
    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .logo-sub { color: var(--txt3); font-weight: 400; font-size: 13px; }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green);
           box-shadow: 0 0 6px var(--green); }
    .status-text { font-size: 12px; color: var(--txt2); }

    /* ── Layout ── */
    .workspace {
      display: grid;
      grid-template-columns: 380px 1fr;
      height: calc(100vh - 56px);
    }

    /* ── Left panel ── */
    .sidebar {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: var(--surface);
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--txt3);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    /* Input */
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; font-weight: 500; color: var(--txt2); }
    .input-wrap { position: relative; }
    .input-wrap input, .input-wrap textarea {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--txt1);
      font-size: 13px;
      font-family: inherit;
      padding: 9px 12px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .input-wrap input:focus, .input-wrap textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }
    .input-wrap textarea { resize: none; }
    .key-toggle {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--txt3); cursor: pointer;
      font-size: 13px; padding: 2px;
      transition: color .15s;
    }
    .key-toggle:hover { color: var(--txt2); }

    /* Upload zone */
    .upload-zone {
      border: 1.5px dashed var(--border2);
      border-radius: var(--radius);
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: border-color .2s, background .2s;
      background: var(--panel);
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: var(--glow);
    }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }
    .upload-icon {
      width: 40px; height: 40px;
      border: 1.5px solid var(--border2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 10px;
      font-size: 18px;
      background: var(--surface);
    }
    .upload-hint { font-size: 12px; color: var(--txt3); line-height: 1.6; }
    .upload-hint strong { color: var(--txt2); }

    .preview-strip {
      display: none;
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .preview-strip img {
      width: 100%; display: block;
      max-height: 180px; object-fit: cover;
    }
    .preview-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.7) 0%, transparent 50%);
      display: flex; align-items: flex-end; padding: 10px 12px;
      justify-content: space-between;
    }
    .preview-name { font-size: 11px; color: #fff; opacity: .8; }
    .clear-btn {
      background: rgba(255,255,255,.12);
      border: none; border-radius: 6px;
      color: #fff; font-size: 11px;
      padding: 3px 8px; cursor: pointer;
      transition: background .15s;
    }
    .clear-btn:hover { background: rgba(255,255,255,.22); }

    /* Position chips */
    .position-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }
    .pos-chip {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--txt2);
      font-size: 12px;
      font-weight: 500;
      padding: 8px 10px;
      cursor: pointer;
      text-align: left;
      transition: all .15s;
      display: flex; align-items: center; gap: 6px;
    }
    .pos-chip .chip-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--border2); flex-shrink: 0;
      transition: background .15s;
    }
    .pos-chip:hover { border-color: var(--accent2); color: var(--txt1); }
    .pos-chip.active {
      background: var(--glow);
      border-color: var(--accent);
      color: var(--txt1);
    }
    .pos-chip.active .chip-dot { background: var(--accent); }

    /* Toggle */
    .toggle-row {
      display: flex; align-items: center;
      justify-content: space-between; gap: 12px;
    }
    .toggle-info { display: flex; flex-direction: column; gap: 2px; }
    .toggle-label { font-size: 12px; font-weight: 500; color: var(--txt2); }
    .toggle-sub   { font-size: 11px; color: var(--txt3); }
    .toggle-switch { position: relative; flex-shrink: 0; cursor: pointer; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      display: block; width: 36px; height: 20px;
      background: var(--border2); border-radius: 20px;
      transition: background .2s;
      position: relative;
    }
    .toggle-track::after {
      content: ''; position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      border-radius: 50%; background: #fff;
      transition: transform .2s;
    }
    .toggle-switch input:checked + .toggle-track { background: var(--accent); }
    .toggle-switch input:checked + .toggle-track::after { transform: translateX(16px); }

    /* Duration */
    .slider-row { display: flex; align-items: center; gap: 12px; }
    input[type="range"] {
      flex: 1; accent-color: var(--accent);
      background: transparent; cursor: pointer;
    }
    .slider-val {
      font-size: 13px; font-weight: 600;
      color: var(--accent2); min-width: 28px; text-align: right;
    }

    /* Divider */
    .divider { height: 1px; background: var(--border); }

    /* Generate button */
    .gen-btn {
      width: 100%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none; border-radius: var(--radius);
      color: #fff; font-size: 14px; font-weight: 600;
      font-family: inherit;
      padding: 13px;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      box-shadow: 0 4px 20px rgba(99,102,241,.3);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .gen-btn:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .gen-btn:active:not(:disabled) { transform: translateY(0); }
    .gen-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    /* Spinner */
    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Main / Output ── */
    .main {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .output-header {
      padding: 20px 28px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .output-title {
      font-size: 13px; font-weight: 600; color: var(--txt2);
    }

    .output-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 28px;
      overflow-y: auto;
      gap: 20px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      max-width: 320px;
    }
    .empty-glyph {
      width: 72px; height: 72px;
      border: 1.5px solid var(--border2);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 30px;
      background: var(--surface);
    }
    .empty-state h2 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .empty-state p { font-size: 13px; color: var(--txt3); line-height: 1.6; }

    /* Job status panel */
    .job-panel {
      width: 100%;
      display: none;
      flex-direction: column;
      gap: 20px;
    }

    /* Active job cards */
    #active-jobs { display: flex; flex-direction: column; gap: 16px; width: 100%; }
    .active-job-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .active-job-card .aj-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .active-job-card .aj-pos {
      font-size: 12px; font-weight: 600; color: var(--txt1);
      text-transform: capitalize; flex: 1;
    }
    .active-job-card .aj-id {
      font-size: 10px; font-family: monospace; color: var(--txt3);
    }
    .active-job-card .aj-progress {
      height: 2px; background: var(--border);
    }
    .active-job-card .aj-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .5s;
    }
    .active-job-card .aj-log {
      padding: 10px 16px;
      font-size: 11px; color: var(--txt2);
      min-height: 32px;
    }
    .active-job-card .aj-video {
      background: #000;
      display: none;
    }
    .active-job-card .aj-video video {
      width: 100%; display: block; max-height: 360px; object-fit: contain;
    }
    .active-job-card .aj-actions {
      display: flex; gap: 8px; padding: 10px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .active-job-card .aj-error {
      padding: 10px 16px;
      font-size: 11px; color: var(--red);
      background: rgba(244,63,94,.05);
      display: none;
    }

    /* History */
    .history-section { width: 100%; }
    .history-title {
      font-size: 11px; font-weight: 600; color: var(--txt3);
      text-transform: uppercase; letter-spacing: .6px;
      margin-bottom: 12px;
    }
    .history-list { display: flex; flex-direction: column; gap: 10px; }
    .history-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
      transition: border-color .15s;
    }
    .history-card:hover { border-color: var(--border2); }
    .history-thumb {
      width: 56px; height: 40px;
      border-radius: 6px;
      background: #000;
      overflow: hidden; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--txt3); font-size: 18px;
    }
    .history-thumb video { width: 100%; height: 100%; object-fit: cover; }
    .history-info { flex: 1; min-width: 0; }
    .history-pos { font-size: 12px; font-weight: 600; color: var(--txt1); text-transform: capitalize; }
    .history-meta { font-size: 11px; color: var(--txt3); margin-top: 2px; }
    .history-id { font-size: 10px; font-family: monospace; color: var(--txt3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .history-btn {
      font-size: 11px; padding: 4px 10px;
      border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface); color: var(--txt2);
      cursor: pointer; font-family: inherit;
      text-decoration: none; display: inline-flex; align-items: center;
      transition: border-color .15s, color .15s;
    }
    .history-btn:hover { border-color: var(--accent2); color: var(--txt1); }

    .job-header {
      display: flex; align-items: center; gap: 12px;
    }
    .job-id-badge {
      font-size: 11px; font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--txt3);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
    }

    /* Status pill */
    .status-pill {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .status-pill::before {
      content: ''; width: 6px; height: 6px;
      border-radius: 50%; flex-shrink: 0;
    }
    .pill-queued     { background: rgba(245,158,11,.1); color: var(--amber); }
    .pill-queued::before { background: var(--amber); box-shadow: 0 0 5px var(--amber); }
    .pill-processing { background: rgba(56,189,248,.1); color: var(--sky); }
    .pill-processing::before { background: var(--sky); box-shadow: 0 0 5px var(--sky); animation: pulse 1s infinite; }
    .pill-postprocessing { background: rgba(56,189,248,.1); color: var(--sky); }
    .pill-postprocessing::before { background: var(--sky); animation: pulse 1s infinite; }
    .pill-completed  { background: rgba(16,185,129,.1); color: var(--green); }
    .pill-completed::before { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .pill-failed     { background: rgba(244,63,94,.1); color: var(--red); }
    .pill-failed::before { background: var(--red); }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: .4; }
    }

    /* Progress */
    .progress-track {
      height: 3px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .5s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 8px var(--glow);
    }

    /* Log */
    .log-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .log-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--txt3);
    }
    .log-body {
      padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .log-row {
      display: flex; align-items: flex-start; gap: 10px;
    }
    .log-time { font-size: 11px; color: var(--txt3); font-family: monospace; min-width: 55px; }
    .log-msg  { font-size: 12px; color: var(--txt2); }
    .log-msg.active { color: var(--txt1); }

    /* Video */
    .video-card {
      background: #000;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }
    .video-card video {
      width: 100%; display: block;
      max-height: 400px; object-fit: contain;
    }
    .video-actions {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex; gap: 8px;
      background: var(--panel);
    }
    .action-btn {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--txt2);
      font-size: 12px; font-weight: 500;
      font-family: inherit;
      padding: 8px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      transition: border-color .15s, color .15s;
    }
    .action-btn:hover { border-color: var(--accent2); color: var(--txt1); }

    .error-card {
      background: rgba(244,63,94,.05);
      border: 1px solid rgba(244,63,94,.2);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 12px; color: var(--red);
      display: none;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .workspace { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      .sidebar { height: auto; max-height: 55vh; }
      .main { min-height: 45vh; }
    }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">🐦</div>
    Piigu
    <span class="logo-sub">/ Studio</span>
  </div>
  <div class="topbar-right">
    <div class="dot" id="conn-dot" style="background:var(--txt3);box-shadow:none"></div>
    <span class="status-text" id="conn-text">Checking…</span>
  </div>
</div>

<div class="workspace">

  <!-- ── Left sidebar ── -->
  <div class="sidebar">

    <!-- Auth -->
    <div>
      <div class="section-label">Authentication</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div class="field">
          <label>API Key</label>
          <div class="input-wrap">
            <input type="password" id="api-key"
              value="pk_O6hn8yOGhJPS2CC-4riPJjXYfvW36tHf9FtjoHEJpSs"
              placeholder="pk_…" />
            <button class="key-toggle" id="key-toggle" title="Toggle visibility">👁</button>
          </div>
        </div>
        <div class="field">
          <label>Base URL</label>
          <div class="input-wrap">
            <input type="text" id="base-url" value="https://www.racoonn.me" />
          </div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Image -->
    <div>
      <div class="section-label">Input Image</div>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept="image/*" />
        <div class="upload-icon">📎</div>
        <div class="upload-hint">
          <strong>Click to upload</strong> or drag & drop<br/>
          PNG, JPG, WEBP
        </div>
      </div>
      <div class="preview-strip" id="preview-strip" style="margin-top:10px">
        <img id="preview-img" src="" alt="preview" />
        <div class="preview-overlay">
          <span class="preview-name" id="preview-name"></span>
          <button class="clear-btn" id="clear-btn">Remove</button>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Position -->
    <div>
      <div class="section-label">Position</div>
      <div class="position-grid" id="position-grid">
        <button class="pos-chip" data-value="blow_job"><span class="chip-dot"></span>Blow Job</button>
        <button class="pos-chip active" data-value="cowgirl"><span class="chip-dot"></span>Cowgirl</button>
        <button class="pos-chip" data-value="doggy"><span class="chip-dot"></span>Doggy Style</button>
        <button class="pos-chip" data-value="handjob"><span class="chip-dot"></span>Handjob</button>
        <button class="pos-chip" data-value="lift_clothes"><span class="chip-dot"></span>Lift Clothes</button>
        <button class="pos-chip" data-value="masturbation"><span class="chip-dot"></span>Masturbation</button>
        <button class="pos-chip" data-value="missionary"><span class="chip-dot"></span>Missionary</button>
        <button class="pos-chip" data-value="reverse_cowgirl"><span class="chip-dot"></span>Rev. Cowgirl</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Params -->
    <div>
      <div class="section-label">Parameters</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="field">
          <div class="toggle-row">
            <div class="toggle-info">
              <span class="toggle-label">Audio / Dirty Talk</span>
              <span class="toggle-sub">Character vocal audio</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="audio-toggle" />
              <span class="toggle-track"></span>
            </label>
          </div>
          <div id="audio-desc-wrap" style="display:none;margin-top:10px">
            <div class="input-wrap">
              <textarea id="audio-description" rows="2" placeholder="What you want the character to say… (leave empty for default)"></textarea>
            </div>
          </div>
        </div>
        <div class="field">
          <label>Duration</label>
          <div class="slider-row">
            <input type="range" id="duration" min="5" max="10" value="10" step="1" />
            <span class="slider-val" id="duration-val">10s</span>
          </div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Submit -->
    <button class="gen-btn" id="gen-btn">
      <div class="spinner" id="spinner"></div>
      <span id="gen-label">Generate Video</span>
    </button>

  </div>

  <!-- ── Main output ── -->
  <div class="main">
    <div class="output-header">
      <span class="output-title">Output</span>
    </div>

    <div class="output-body" id="output-body">

      <!-- Empty state -->
      <div class="empty-state" id="empty-state" style="margin:auto">
        <div class="empty-glyph">🎬</div>
        <h2>No video yet</h2>
        <p>Configure your parameters on the left,<br/>then hit Generate to create a video.</p>
      </div>

      <!-- Active jobs -->
      <div id="active-jobs"></div>

      <!-- History -->
      <div class="history-section" id="history-section" style="display:none">
        <div class="history-title">History</div>
        <div class="history-list" id="history-list"></div>
      </div>

    </div>
  </div>

</div>

<script>
  const $ = id => document.getElementById(id);

  const API_KEY  = () => $('api-key').value.trim();
  const BASE_URL = () => $('base-url').value.trim().replace(/\/$/, '');

  let selectedPos = 'cowgirl';
  let imageBase64 = null;
  let fileName    = '';

  // ── History (localStorage) ──
  const HISTORY_KEY = 'piigu_history';
  let history = (() => { try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch { return []; } })();

  function saveHistory() { try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, 50))); } catch {} }

  function addToHistory(entry) {
    history.unshift(entry);
    saveHistory();
    renderHistory();
  }

  function renderHistory() {
    if (!history.length) { $('history-section').style.display = 'none'; return; }
    $('history-section').style.display = 'block';
    $('history-list').innerHTML = history.map((h, i) => `
      <div class="history-card" id="hcard-${i}" onclick="expandHistory(${i})">
        <div class="history-thumb">
          ${h.video_url
            ? `<video src="${h.video_url}" muted playsinline preload="metadata"></video>`
            : (h.status === 'failed' ? '✕' : '⏳')}
        </div>
        <div class="history-info">
          <div class="history-pos">${h.position.replace('_',' ')}</div>
          <div class="history-meta">${h.duration}s · ${h.ts}</div>
          <div class="history-id">${h.job_id}</div>
        </div>
        <div class="history-actions">
          ${h.video_url ? `<a class="history-btn" href="${h.video_url}" download onclick="event.stopPropagation()">↓</a>` : ''}
          <span class="status-pill pill-${h.status}" style="font-size:10px;padding:3px 8px">${h.status}</span>
        </div>
        ${h.video_url ? `<div class="history-player" id="hplayer-${i}" style="display:none;background:#000;border-top:1px solid var(--border)">
          <video controls autoplay playsinline style="width:100%;max-height:300px;display:block;object-fit:contain"></video>
        </div>` : ''}
      </div>
    `).join('');
  }

  window.expandHistory = function(i) {
    const h = history[i];
    if (!h.video_url) return;
    const player = document.getElementById(`hplayer-${i}`);
    if (!player) return;
    const isOpen = player.style.display !== 'none';
    // close all others
    document.querySelectorAll('.history-player').forEach(p => { p.style.display = 'none'; p.querySelector('video').pause(); });
    if (isOpen) return;
    player.style.display = 'block';
    const v = player.querySelector('video');
    v.src = h.video_url;
    v.play();
    v.ontimeupdate = () => { if (v.currentTime >= 10) { v.pause(); v.ontimeupdate = null; } };
  };

  renderHistory();

  // ── Connection check ──
  async function checkConnection() {
    try {
      const r = await fetch(`${BASE_URL()}/health`);
      if (r.ok) {
        $('conn-dot').style.cssText = 'width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)';
        $('conn-text').textContent = 'Connected';
      } else throw new Error();
    } catch {
      $('conn-dot').style.cssText = 'width:7px;height:7px;border-radius:50%;background:var(--red)';
      $('conn-text').textContent = 'Offline';
    }
  }
  checkConnection();
  setInterval(checkConnection, 30000);

  // ── API key toggle ──
  $('key-toggle').addEventListener('click', () => {
    const inp = $('api-key');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });

  // ── Position chips ──
  document.querySelectorAll('.pos-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.pos-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedPos = btn.dataset.value;
    });
  });

  // ── Audio toggle ── (presets handled server-side, nothing to show)
  $('audio-toggle').addEventListener('change', () => {
    $('audio-desc-wrap').style.display = $('audio-toggle').checked ? 'block' : 'none';
  });

  // ── Duration ──
  $('duration').addEventListener('input', () => {
    $('duration-val').textContent = $('duration').value + 's';
  });

  // ── Upload ──
  const zone = $('upload-zone');
  zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', ()=> zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });
  $('file-input').addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });

  function loadFile(file) {
    fileName = file.name;
    const reader = new FileReader();
    reader.onload = e => {
      imageBase64 = e.target.result.split(',')[1];
      $('preview-img').src = e.target.result;
      $('preview-name').textContent = file.name;
      $('preview-strip').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  $('clear-btn').addEventListener('click', () => {
    imageBase64 = null; fileName = '';
    $('preview-strip').style.display = 'none';
    $('preview-img').src = '';
    $('file-input').value = '';
  });

  // ── Generate ──
  $('gen-btn').addEventListener('click', async () => {
    if (!API_KEY())   return toast('Enter your API key');
    if (!imageBase64) return toast('Upload an image first');

    const pos = selectedPos;
    const dur = parseInt($('duration').value);

    // Create a pending card immediately
    const card = createJobCard(pos, dur);
    $('empty-state').style.display = 'none';

    try {
      const res = await fetch(`${BASE_URL()}/v1/generate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY() },
        body: JSON.stringify({
          image_base64:  imageBase64,
          position:      pos,
          duration:      dur,
          include_audio: $('audio-toggle').checked,
          audio_description: $('audio-toggle').checked ? $('audio-description').value.trim() : '',
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(typeof data.detail === 'object' && data.detail !== null ? JSON.stringify(data.detail) : (data.detail || JSON.stringify(data)));

      card.querySelector('.aj-id').textContent = data.job_id;
      cardLog(card, `Queued · #${data.position_in_queue} · ~${data.estimated_wait_seconds}s`);
      startPolling(data.job_id, pos, dur, card);
    } catch(err) {
      cardError(card, err.message);
      toast('Error: ' + err.message);
    }
  });

  // ── Per-job card ──
  function createJobCard(pos, dur) {
    const card = document.createElement('div');
    card.className = 'active-job-card';
    card.innerHTML = `
      <div class="aj-header">
        <span class="status-pill pill-queued" style="font-size:11px">queued</span>
        <span class="aj-pos">${pos.replace('_',' ')} · ${dur}s</span>
        <span class="aj-id">—</span>
      </div>
      <div class="aj-progress"><div class="aj-fill" style="width:0%"></div></div>
      <div class="aj-log">Submitting…</div>
      <div class="aj-video">
        <video controls autoplay playsinline></video>
        <div class="aj-actions">
          <a class="action-btn aj-dl" href="#" download>↓ Download MP4</a>
        </div>
      </div>
      <div class="aj-error"></div>
    `;
    $('active-jobs').prepend(card);
    return card;
  }

  function cardStatus(card, status, pct) {
    const pill = card.querySelector('.status-pill');
    pill.textContent = status.replace('_',' ');
    pill.className = `status-pill pill-${status}`;
    card.querySelector('.aj-fill').style.width = pct + '%';
  }

  function cardLog(card, msg) {
    card.querySelector('.aj-log').textContent = msg;
  }

  function cardError(card, msg) {
    cardStatus(card, 'failed', 0);
    card.querySelector('.aj-error').textContent = '⚠ ' + msg;
    card.querySelector('.aj-error').style.display = 'block';
    card.querySelector('.aj-log').style.display = 'none';
  }

  // ── Polling (independent per job) ──
  function startPolling(jobId, position, duration, card) {
    let lastStatus = '';
    const timer = setInterval(async () => {
      try {
        const res = await fetch(`${BASE_URL()}/v1/jobs/${jobId}`, {
          headers: { 'X-API-Key': API_KEY() }
        });
        const job = await res.json();
        const pct = Math.round((job.progress || 0) * 100);
        cardStatus(card, job.status, pct);

        if (job.status !== lastStatus) {
          lastStatus = job.status;
          const msgs = {
            processing:     `Inference running… (${pct}%)`,
            postprocessing: 'Enhancing with GFPGAN…',
            completed:      'Video ready ✓',
            failed:         `Failed: ${job.error || 'unknown error'}`,
          };
          if (msgs[job.status]) cardLog(card, msgs[job.status]);
        } else if (job.status === 'processing') {
          cardLog(card, `Inference running… (${pct}%)`);
        }

        if (job.status === 'completed') {
          clearInterval(timer);
          const v = card.querySelector('video');
          v.src = job.video_url;
          card.querySelector('.aj-dl').href = job.video_url;
          card.querySelector('.aj-video').style.display = 'block';
          v.ontimeupdate = () => { if (v.currentTime >= 10) { v.pause(); v.ontimeupdate = null; } };
          addToHistory({ job_id: jobId, position, duration, status: 'completed', video_url: job.video_url, ts: new Date().toLocaleTimeString() });
        } else if (['failed', 'cancelled'].includes(job.status)) {
          clearInterval(timer);
          cardError(card, job.error || 'Job failed unexpectedly.');
          addToHistory({ job_id: jobId, position, duration, status: 'failed', video_url: null, ts: new Date().toLocaleTimeString() });
        }
      } catch(e) { console.warn('poll error', e); }
    }, 3000);
  }

  // ── Toast ──
  function toast(msg) {
    const el = document.createElement('div');
    el.textContent = msg;
    Object.assign(el.style, {
      position:'fixed', bottom:'24px', left:'50%', transform:'translateX(-50%)',
      background:'#1e2738', border:'1px solid var(--border2)',
      color:'var(--txt1)', padding:'10px 20px', borderRadius:'8px',
      fontSize:'13px', zIndex:'999', boxShadow:'0 8px 24px rgba(0,0,0,.4)',
      animation:'fadeIn .2s ease',
    });
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
</script>
</body>
</html>
